query GetMarketsPageData {
  listings(first: 100, orderBy: createdAt, orderDirection: desc) {
    id
    tokenId
    assetId
    seller
    amount
    amountSold
    pricePerToken
    expiresAt
    buyerPaysFee
    status
    isEnded
    createdAt
  }
  primaryPools(first: 100, orderBy: createdAt, orderDirection: desc) {
    id
    tokenId
    assetId
    partner
    pricePerToken
    maxSupply
    immediateProceeds
    protectionEnabled
    isPaused
    isClosed
    createdAt
    pausedAt
    closedAt
    totalPurchased
    totalRedeemed
    totalPartnerProceedsReleased
  }
  vehicles(first: 100) {
    id
    partner
    vin
    make
    model
    year
    metadataURI
  }
  roboshareTokens(first: 100) {
    id
    revenueTokenId
    price
    supply
    createdAt
    maturityDate
  }
  assetEarnings(first: 100) {
    id
    assetId
    totalEarnings
    totalRevenue
    distributionCount
    lastDistributionAt
    firstDistributionAt
  }
  partners(first: 100) {
    id
    name
    address
  }
}
