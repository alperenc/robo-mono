specVersion: 0.0.4
description: Roboshare Protocol Subgraph
repository: https://github.com/Roboshare/robo-mono
schema:
  file: ./src/schema.graphql
dataSources:
  - kind: ethereum/contract
    name: MockUSDC
    network: sepolia
    source:
      abi: MockUSDC
      address: "0x44E46A2ab9f70c31C0B1A59A93a47dC1228542c3"
      startBlock: 10531676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - MockUSDCContract
        - Transfer
      abis:
        - name: MockUSDC
          file: ./abis/MockUSDC.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleMockUSDCTransfer
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: RoboshareTokens
    network: sepolia
    source:
      abi: RoboshareTokens
      address: "0xadb21069c84137A222F0cd19F055EAF2664e6A09"
      startBlock: 10531676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - RoboshareTokensContract
        - TransferSingle
        - RevenueTokenInfoSet
      abis:
        - name: RoboshareTokens
          file: ./abis/RoboshareTokens.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed
            address,uint256,uint256)
          handler: handleRoboshareTokensTransferSingle
        - event: RevenueTokenInfoSet(indexed
            uint256,uint256,uint256,uint256,uint256,bool,bool)
          handler: handleRevenueTokenInfoSet
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: PartnerManager
    network: sepolia
    source:
      abi: PartnerManager
      address: "0x476eDD9b72a265BAeC48D8dc52520FC25e67CDB0"
      startBlock: 10531676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - PartnerManagerContract
        - PartnerAuthorized
      abis:
        - name: PartnerManager
          file: ./abis/PartnerManager.json
      eventHandlers:
        - event: PartnerAuthorized(indexed address,string)
          handler: handlePartnerAuthorized
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: RegistryRouter
    network: sepolia
    source:
      abi: RegistryRouter
      address: "0x253036b8EeBce9a4291e8803b8dbbE0d84FFa71f"
      startBlock: 10531676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - RegistryRouterContract
        - AssetRegistered
      abis:
        - name: RegistryRouter
          file: ./abis/RegistryRouter.json
      eventHandlers:
        - event: IdBoundToRegistry(indexed uint256,indexed address)
          handler: handleIdBoundToRegistry
        - event: AssetRegistered(indexed uint256,indexed address,uint256,uint8)
          handler: handleAssetRegistered
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: VehicleRegistry
    network: sepolia
    source:
      abi: VehicleRegistry
      address: "0xD354d2AFBe2392082DE611503F333Bb2b2C41430"
      startBlock: 10531676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - VehicleRegistryContract
        - VehicleRegistered
        - VehicleRegisteredAndMinted
      abis:
        - name: VehicleRegistry
          file: ./abis/VehicleRegistry.json
      eventHandlers:
        - event: AssetRegistered(indexed uint256,indexed address,uint256,uint8)
          handler: handleAssetRegistered
        - event: VehicleRegistered(indexed uint256,indexed address,string)
          handler: handleVehicleRegistered
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: Treasury
    network: sepolia
    source:
      abi: Treasury
      address: "0xd0873Ee52DAecD392f97980E9FB934e487995e16"
      startBlock: 10531676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - TreasuryContract
        - CollateralLocked
      abis:
        - name: Treasury
          file: ./abis/Treasury.json
      eventHandlers:
        - event: CollateralLocked(indexed uint256,indexed address,uint256)
          handler: handleCollateralLocked
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: EarningsManager
    network: sepolia
    source:
      abi: EarningsManager
      address: "0x6e03547Dc90E060b20f5c9F689D76fcC475C2ab7"
      startBlock: 10531677
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - EarningsDistribution
        - AssetEarning
      abis:
        - name: EarningsManager
          file: ./abis/EarningsManager.json
      eventHandlers:
        - event: EarningsDistributed(indexed uint256,indexed
            address,uint256,uint256,uint256)
          handler: handleEarningsDistributed
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: Marketplace
    network: sepolia
    source:
      abi: Marketplace
      address: "0xD3Dc47372BB360822212F7E7159D0DB5fdCA8A85"
      startBlock: 10531676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - MarketplaceContract
        - ListingCreated
      abis:
        - name: Marketplace
          file: ./abis/Marketplace.json
      eventHandlers:
        - event: ListingCreated(indexed uint256,indexed uint256,indexed
            uint256,address,uint256,uint256,uint256,bool)
          handler: handleListingCreated
        - event: RevenueTokensTraded(indexed uint256,indexed address,indexed
            address,uint256,uint256,uint256)
          handler: handleRevenueTokensTraded
        - event: ListingEnded(indexed uint256,indexed address)
          handler: handleListingEnded
        - event: ListingExtended(indexed uint256,uint256)
          handler: handleListingExtended
        - event: PrimaryPoolCreated(indexed uint256,indexed
            address,uint256,uint256,bool,bool)
          handler: handlePrimaryPoolCreated
        - event: PrimaryPoolPaused(indexed uint256)
          handler: handlePrimaryPoolPaused
        - event: PrimaryPoolUnpaused(indexed uint256)
          handler: handlePrimaryPoolUnpaused
        - event: PrimaryPoolClosed(indexed uint256)
          handler: handlePrimaryPoolClosed
        - event: PrimaryPoolPurchased(indexed uint256,indexed
            address,uint256,uint256,uint256,uint256)
          handler: handlePrimaryPoolPurchased
        - event: PrimaryPoolRedeemed(indexed uint256,indexed
            address,uint256,uint256,uint256)
          handler: handlePrimaryPoolRedeemed
      file: ./src/mapping.ts
features:
  - fullTextSearch
