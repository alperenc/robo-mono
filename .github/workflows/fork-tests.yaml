name: Contracts Fork Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      invariant_suite:
        description: "Fork invariant suite to run"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - protocol-references
          - listing-locks
          - treasury-accounting

jobs:
  fork-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node env
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Start local fork
        working-directory: protocols/evm
        env:
          FORK_URL: ${{ secrets.EVM_FORK_URL }}
        run: |
          test -n "$FORK_URL"
          nohup anvil \
            --fork-url "$FORK_URL" \
            --host 127.0.0.1 \
            --port 8545 \
            --fork-retry-backoff 1000 \
            --retries 15 \
            --timeout 120000 \
            --compute-units-per-second 500 \
            >/tmp/evm-fork-tests-anvil.log 2>&1 &

          for i in $(seq 1 30); do
            if curl -s \
              -H "Content-Type: application/json" \
              --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
              http://127.0.0.1:8545 >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/evm-fork-tests-anvil.log
          exit 1

      - name: Run forked contract tests
        working-directory: protocols/evm
        env:
          FORK_URL: "http://127.0.0.1:8545"
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"
          TREASURY_FEE_RECIPIENT: "0x000000000000000000000000000000000000dEaD"
        run: |
          test -n "$FORK_URL"
          forge --version
          forge clean || true
          forge test --fork-url "$FORK_URL" --no-match-path 'test/property/*.Invariant.t.sol'

  fork-invariants:
    needs: fork-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node env
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Select fork invariant suite
        id: invariant-suite
        working-directory: protocols/evm
        env:
          REQUESTED_INVARIANT_SUITE: ${{ github.event.inputs.invariant_suite }}
        run: |
          requested="${REQUESTED_INVARIANT_SUITE:-auto}"

          if [ "$requested" = "auto" ]; then
            suite_index=$((10#$(date -u +%j) % 3))
            case "$suite_index" in
              0) requested="protocol-references" ;;
              1) requested="listing-locks" ;;
              2) requested="treasury-accounting" ;;
            esac
          fi

          case "$requested" in
            protocol-references)
              match_path='test/property/ProtocolReferences.Invariant.t.sol'
              ;;
            listing-locks)
              match_path='test/property/ListingLocks.Invariant.t.sol'
              ;;
            treasury-accounting)
              match_path='test/property/TreasuryAccounting.Invariant.t.sol'
              ;;
            *)
              echo "Unsupported invariant suite: $requested" >&2
              exit 1
              ;;
          esac

          echo "Selected fork invariant suite: $requested"
          echo "selected_suite=$requested" >> "$GITHUB_OUTPUT"
          echo "match_path=$match_path" >> "$GITHUB_OUTPUT"

      - name: Start local fork
        working-directory: protocols/evm
        env:
          FORK_URL: ${{ secrets.EVM_FORK_URL }}
        run: |
          test -n "$FORK_URL"
          nohup anvil \
            --fork-url "$FORK_URL" \
            --host 127.0.0.1 \
            --port 8545 \
            --fork-retry-backoff 1000 \
            --retries 15 \
            --timeout 120000 \
            --compute-units-per-second 500 \
            >/tmp/evm-fork-invariants-anvil.log 2>&1 &

          for i in $(seq 1 30); do
            if curl -s \
              -H "Content-Type: application/json" \
              --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
              http://127.0.0.1:8545 >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/evm-fork-invariants-anvil.log
          exit 1

      - name: Run forked property tests
        working-directory: protocols/evm
        env:
          FORK_URL: "http://127.0.0.1:8545"
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"
          TREASURY_FEE_RECIPIENT: "0x000000000000000000000000000000000000dEaD"
        run: |
          test -n "$FORK_URL"
          echo "Running fork invariant suite: ${{ steps.invariant-suite.outputs.selected_suite }}"
          forge --version
          forge clean || true
          FOUNDRY_INVARIANT_RUNS=128 FOUNDRY_INVARIANT_DEPTH=200 forge test \
            --fork-url "$FORK_URL" \
            --match-path '${{ steps.invariant-suite.outputs.match_path }}'
